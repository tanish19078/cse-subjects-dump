<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bootstrap Grid Layout</title>
  <!-- Bootstrap CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
  <header class="bg-primary text-white text-center p-4">
    <h1>My Bootstrap Web Layout</h1>
  </header>

  <div class="container mt-4">
    <div class="row text-center">
      <div class="col-md-4 col-sm-12 p-3 bg-light border">
        <h3>Column 1</h3>
        <p>This section contains sample content using Bootstrap grid.</p>
      </div>
      <div class="col-md-4 col-sm-12 p-3 bg-secondary text-white border">
        <h3>Column 2</h3>
        <p>Bootstrap utility classes manage padding, color, and alignment.</p>
      </div>
      <div class="col-md-4 col-sm-12 p-3 bg-light border">
        <h3>Column 3</h3>
        <p>The layout adjusts automatically for all screen sizes.</p>
      </div>
    </div>
  </div>

  <footer class="bg-dark text-white text-center p-3 mt-4">
    <p>&copy; 2025 My Website | Designed with Bootstrap</p>
  </footer>
</body>
</html>

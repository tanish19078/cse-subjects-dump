<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Hover and Active Effects</title>
  <style>
    button {
      background-color: #6f42c1;
      color: white;
      border: none;
      padding: 15px 25px;
      font-size: 1rem;
      border-radius: 8px;
      transition: 0.3s;
    }

    button:hover {
      background-color: #9b59b6;
      transform: scale(1.1);
    }

    button:active {
      background-color: #4b0082;
      transform: scale(0.95);
    }
  </style>
</head>
<body style="text-align:center; padding:50px;">
  <button>Hover or Click Me</button>
</body>
</html>

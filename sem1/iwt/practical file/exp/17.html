<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Pseudo Elements Example</title>
  <style>
    h1 {
      position: relative;
      text-align: center;
      color: #6f42c1;
    }

    h1::before {
      content: "★ ";
      color: gold;
    }

    h1::after {
      content: " ★";
      color: gold;
    }
  </style>
</head>
<body>
  <h1>Welcome to My Page</h1>
</body>
</html>

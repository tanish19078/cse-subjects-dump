<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ball Animation with Size Slider</title>
    <style>
        /* --- CSS STYLES --- */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #222;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        /* 1. The Main Animation Box */
        .container {
            width: 600px;
            height: 400px;
            border: 4px solid #00d2ff;
            background-color: #333;
            position: relative; /* Needed for absolute positioning of ball */
            margin-bottom: 20px;
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.2);
        }

        /* 2. The Ball */
        .ball {
            /* We use a CSS Variable (--size) here. 
               The slider below updates this variable.
            */
            --size: 50px; 
            
            width: var(--size);
            height: var(--size);
            background-color: #ff4757;
            border-radius: 50%;
            position: absolute;
            top: 0;
            left: 0;
            box-shadow: 0 0 15px rgba(255, 71, 87, 0.6);

            /* Animation Settings */
            animation-name: pathMovement;
            animation-duration: 4s; /* Speed of movement */
            animation-timing-function: linear; /* Constant speed */
            animation-iteration-count: infinite; /* Loop forever */
            animation-direction: alternate; /* Go forward then backward */
        }

        /* 3. The Sequential Animation Logic */
        @keyframes pathMovement {
            /* Phase 1: Start at Top-Left */
            0% {
                left: 0;
                top: 0;
            }
            /* Phase 2: Move to Top-Right */
            /* We use calc() to stop exactly at the edge based on current ball size */
            50% {
                left: calc(100% - var(--size));
                top: 0;
            }
            /* Phase 3: Move to Bottom-Right */
            100% {
                left: calc(100% - var(--size));
                top: calc(100% - var(--size));
            }
        }

        /* 4. The "Extra Box Down" (Controls) */
        .controls-box {
            background-color: #444;
            padding: 20px 40px;
            border-radius: 10px;
            border: 1px solid #555;
            text-align: center;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        label {
            font-size: 1.2rem;
            font-weight: bold;
        }

        /* Slider Styling */
        input[type="range"] {
            width: 300px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="ball" id="ball"></div>
    </div>

    <div class="controls-box">
        <label for="sizeSlider">Ball Size Control</label>
        <input type="range" id="sizeSlider" min="20" max="150" value="50">
        <span id="sizeValue">50px</span>
    </div>

    <script>
        const slider = document.getElementById('sizeSlider');
        const ball = document.getElementById('ball');
        const display = document.getElementById('sizeValue');

        // Listen for slider movement
        slider.addEventListener('input', function() {
            // 1. Get value
            const newSize = this.value + 'px';
            
            // 2. Update text
            display.innerText = newSize;
            
            // 3. Update the CSS Variable on the ball
            ball.style.setProperty('--size', newSize);
        });
    </script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Responsive Flexbox Navbar</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #f8f9fa;
    }

    /* Navigation bar container */
    nav {
      display: flex;
      justify-content: space-between; /* horizontal alignment */
      align-items: center; /* vertical alignment */
      background-color: #6f42c1; /* Updated Purple Theme */
      padding: 15px 30px;
      flex-wrap: wrap; /* make it responsive */
    }

    /* Logo or brand name */
    .logo {
      font-size: 1.5rem;
      font-weight: bold;
      color: white;
    }

    /* Navigation links container */
    .nav-links {
      display: flex;
      gap: 20px; /* spacing between links */
    }

    /* Individual link styles */
    .nav-links a {
      color: white;
      text-decoration: none;
      font-size: 1rem;
      transition: color 0.3s ease;
    }

    .nav-links a:hover {
      color: #d6bbfc; /* Light purple hover */
    }

    /* Responsive design for smaller screens */
    @media (max-width: 600px) {
      nav {
        flex-direction: column;
        align-items: flex-start;
      }

      .nav-links {
        flex-direction: column;
        width: 100%;
        margin-top: 10px;
      }

      .nav-links a {
        padding: 8px 0;
      }
    }
  </style>
</head>

<body>
  <nav>
    <div class="logo">MyWebsite</div>
    <div class="nav-links">
      <a href="#">Home</a>
      <a href="#">About</a>
      <a href="#">Services</a>
      <a href="#">Contact</a>
    </div>
  </nav>

  <main style="padding: 20px;">
    <h2>Welcome to My Responsive Page</h2>
    <p>
      This example demonstrates how to design a responsive navigation bar using Flexbox properties such as
      <strong>justify-content</strong> and <strong>align-items</strong>
    </p>
  </main>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CSS Animation Example</title>
  <style>
    .fade {
      width: 300px;
      margin: 50px auto;
      border-radius: 10px;
      animation: fadeIn 3s infinite alternate;
    }

    @keyframes fadeIn {
      from {
        opacity: 0.2;
        transform: scale(0.95);
      }
      to {
        opacity: 1;
        transform: scale(1.05);
      }
    }
  </style>
</head>
<body style="background-color:#f9f9f9; text-align:center;">
  <h2>Simple Fade Animation</h2>
  <img class="fade" src="https://images.unsplash.com/photo-1522202176988-66273c2fd55f" alt="Animated Image">
</body>
</html>

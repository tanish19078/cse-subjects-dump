<html>
<head>
    <title>CSS Table Example</title>
    <style>
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            border: 1px solid black;
            padding: 8px;
            text-align: center;
        }
        th {
            background-color:rgb(38, 111, 179) ;
        }
    </style>
</head>
<body>
    <h1> Table</h1>
    <table>
        <tr>
            <th> Days/Periods </th>
            <th> 1 / 09:00 AM - 10:00 AM </th>
        </tr>
        <tr>
            <td>Monday</td>
            <td>FCS</td>
        </tr>
        <tr>
            <td>TUESDAY</td>
            <td>-</td>
        </tr>
    </table>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap CDN Example</title>

    <!-- Bootstrap CSS from CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

    <div class="container pt-5">
        <h1 class="text-primary text-center">Bootstrap is Working!</h1>
        <p class="text-center">This page uses Bootstrap from CDN.</p>
    </div>

    <div class="container mt-5">
        <div class="row g-3">
            <div class="col-sm-6 col-lg-4">
                <div class="p-3 border bg-light">Column 1</div>
            </div>
            <div class="col-sm-6 col-lg-4">
                <div class="p-3 border bg-light">Column 2</div>
            </div>
            <div class="col-sm-6 col-lg-4">
                <div class="p-3 border bg-light">Column 3</div>
            </div>
        </div>
    </div>

    <div class="container text-center mt-5">
        <button class="btn btn-success">Test Button</button>
    </div>

    <!-- Bootstrap JS Bundle from CDN -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

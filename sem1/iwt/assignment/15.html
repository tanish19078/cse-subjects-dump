<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Responsive Design Example</title>
  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background-color: #f3f3f3;
      text-align: center;
    }

    img {
      width: 80%;
      max-width: 600px;
      min-width: 200px;
      border-radius: 10px;
      margin: 20px;
    }

    p {
      font-size: 1rem;
      max-width: 800px;
      margin: auto;
      padding: 10px;
    }
  </style>
</head>
<body>
  <h1>Responsive Image & Text Example</h1>
  <img src="https://images.unsplash.com/photo-1522202176988-66273c2fd55f" alt="Sample">
  <p>This image and text adjust size automatically using <strong>min-width</strong>, <strong>max-width</strong>, and the <strong>viewport meta tag</strong> for better readability on all devices.</p>
</body>
</html>
